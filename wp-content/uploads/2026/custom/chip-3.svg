  <rect x="118" y="130" width="5" height="3" rx="1" fill="white" opacity="0.4" transform="rotate(-8 118 130)"/>
  <rect x="164" y="142" width="4" height="3" rx="1" fill="white" opacity="0.4" transform="rotate(10 164 142)"/>
